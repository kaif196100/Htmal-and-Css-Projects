<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Bar</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: cursive;
        }

        body {
            background: #d0f3eb;
        }

        nav {
            width: 100%;
            background: #d0f3eb;
            padding: 10px 0;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.3);
        }

       nav .menu{
        max-width: 1370px;
        padding: 0 20px;
        margin: auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
       }
       .logo a {
        text-decoration: none;
        font-size: 1.5rem;
        font-weight: 600;
        color: #907edf;
       }

        .menu ul {
            list-style: none;
            display: flex;
            gap: 2rem;
            font-size: 1.2rem;
        }

        .menu ul a{
           text-decoration: none;
           font-size: 18px;
           display: inline-flex;
           font-weight: 600;
           padding: 10px 15px;
           color: #31344b;
           border-radius: 15px;
           box-shadow: 0 15px 25px rgba(0, 0, 0, 0.1);
           position: relative;
           transition: all 0.3s;
        }
        .menu ul a:hover::before{
            content: " ";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            box-shadow: inset -3px -3px 7px #c7b5b5, inset 3px 3px 5px #8787f3;
            border-radius: 20px;
        }
        .menu ul a:hover{
            color: #8787f3 ;
            
        }
        @media (max-width: 940px) {
        .menu ul {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        max-width: 400px;
        padding-top: 45px;
        height: 100%;
        background: #8787f3;
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.3);
        z-index: 12;
        box-shadow: none;
        }
        .menu ul a {
            display: block;
            font-size: 25px;
            margin-top: 10px;
            box-shadow: none;
        
        }
        .menu ul a:hover::before{
            box-shadow: none;
        }
        .menu ul a:hover{
            background: #fff;
        }
        }

        
    </style>
</head>

<body>
    <nav>
        <div class="menu">
            <div class="logo">
                <a href="">CodingLab</a>
            </div>
            <ul>
                <li>
                    <a href="">Home</a>
                </li>
                <li>
                    <a href="">About</a>
                </li>
                <li>
                    <a href="">Services</a>
                </li>
                <li>
                    <a href="">Contact</a>
                </li>
                <li>
                    <a href="">Feedback</a>
                </li>
            </ul>
        </div>
    </nav>
</body>

</html>
