<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loader</title>
    <style>
        section{
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            background: #436a7e;
        }
        section .frist span{
            position: absolute;
            height: 15px;
            width: 10px;
            background: white;
            border-radius: 80%;
            transform: rotate(calc(var(--i) * (360deg / 15))) translateY(35px);
            animation: animate 1.5s linear infinite;
            animation-delay: calc(var(--i) * 0.1s);
            opacity: 0;
        }
        @keyframes animate {
            0%{
                opacity: 1;
            }
            100%{
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <section>
        <div class="frist">
            <span style="--i:1;"></span>
            <span style="--i:2;"></span>
            <span style="--i:3;"></span>
            <span style="--i:4;"></span>
            <span style="--i:5;"></span>
            <span style="--i:6;"></span>
            <span style="--i:7;"></span>
            <span style="--i:9;"></span>
            <span style="--i:10;"></span>
            <span style="--i:11;"></span>
            <span style="--i:12;"></span>
            <span style="--i:13;"></span>
            <span style="--i:14;"></span>
            <span style="--i:15;"></span>
        </div>
    </section>
</body>
</html>
