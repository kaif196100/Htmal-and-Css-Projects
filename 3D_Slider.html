<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D image slider</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f7f5f5;
            overflow: hidden;
        }

        .banner {
            width: 100%;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        .banner .slider {
            position: absolute;
            width: 200px;
            height: 250px;
            top: 10%;
            left: calc(50% - 100px);
            transform-style: preserve-3d;
            transform: perspective(1000px);
            animation: autoRun 15s linear infinite;
            z-index: 2;
        }

        @keyframes autoRun {
            from {
                transform: perspective(1000px) rotateX(-16deg) rotateY(0deg);
            }

            to {
                transform: perspective(1000px) rotateX(-16deg) rotateY(360deg);
            }
        }

        .banner .slider .item {
            position: absolute;
            inset: 0;
            transform: rotateY(calc((var(--position) - 1) * (360 / var(--quantity)) * 1deg)) translateZ(550px);
        }

        .banner .slider .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /**/
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .banner .container{
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: min(1400px, 100vw);
            height: max-content;
            padding-bottom: 100px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            z-index: 1;
        }
        .banner .container h1{
            font-family: cursive;
            font-size: clamp(4rem, 15vw, 15rem);
            line-height: 1em;
            color: #a19d9d;
            position: relative;
        }
        .banner .container h1::after{
            position: absolute;
            inset: 0;
            content: attr(data-content);
            z-index: 2;
            -webkit-text-stroke: 2px #d2d2d2;
            color: transparent;
        }
        .banner .container {
            font-family: cursive;
            text-align: right;
            max-width: 600px;
        }
        .banner .container .model{
            background: url(chinese.webp);
            width: 100%;
            height: 90vh;
            position: absolute;
            bottom: 0;
            left: 0;
            background-size: auto 130%;
            background-repeat: no-repeat;
            background-position: top center;
            z-index: 0;
        }
    </style>
</head>

<body>
    <div class="banner">
        <div class="slider" style="--quantity: 10">
            <div class="item" style="--position: 1"><img src="black-dragon.webp" alt=""></div>
            <div class="item" style="--position: 2"><img src="dragon-head.jpg" alt=""></div>
            <div class="item" style="--position: 3"><img src="dragon.webp" alt=""></div>
            <div class="item" style="--position: 4"><img src="images.jfif" alt=""></div>
            <div class="item" style="--position: 5"><img src="majestic.webp" alt=""></div>
            <div class="item" style="--position: 6"><img src="tribal-dragon.avif" alt=""></div>
            <div class="item" style="--position: 7"><img src="dragon.webp" alt=""></div>
            <div class="item" style="--position: 8"><img src="dragon.webp" alt=""></div>
            <div class="item" style="--position: 9"><img src="dragon.webp" alt=""></div>
            <div class="item" style="--position: 10"><img src="dragon.webp" alt=""></div>
        </div>
        <div class="container">
            <h1 data-content="CSS ONLY">CSS ONLY</h1>
            <div class="model"></div>
        </div>
    </div>
</body>

</html>
